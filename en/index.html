<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Xlab</title>
    
    <!-- Favicon -->
    <link rel="icon" href="../assets/images/company/xlab_logo.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
    <link href="https://fonts.googleapis.com/css?family=PT+Serif:400,700%7CMuli:400,600&amp;display=swap" rel="stylesheet"> 
    
    <!-- Theme CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">	
    <link rel="stylesheet" href="../assets/css/p-slider.css">
</head>
<body>
    <div class="container">
        
        <!-- Header & Navigation -->
        <header class="js-top">
            <a class="logo" href="index.html" data-cms="global.siteName">Xlab</a>
            
            <div class="top">
                <nav class="navbar js-navbar">
                    <button class="navbar__toggle js-navbar__toggle" aria-expanded="false">Menu</button>
                    <ul class="navbar__menu">
                        <li><a href="products.html">제품</a></li>
                        <li><a href="solutions.html">솔루션</a></li>
                        <li><a href="company.html">기업</a></li>
                        <li><a href="ir.html">IR</a></li>
                        <li><a href="news.html">뉴스</a></li>
                        <li><a href="careers.html">채용</a></li>
                        <li><a href="contact.html">연락</a></li>
                        <li class="lang-toggle" style="margin-left: 15px; font-weight: bold;">
                            <a href="../index.html" style="color: #999;">KR</a> <span style="color:#ccc">|</span> <a href="index.html" style="color: #000;">EN</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </header>

        <!-- Main Content -->
        <main>
            <!-- Slider Section -->
            <div class="slider">
                <div class="slider__viewport zoomIn">
                    
                    <!-- Slider Down: Images -->
                    <div class="slider__down">
                        <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=800&q=80" alt="첫 번째 프로젝트 이미지">
                        <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=800&q=80" alt="두 번째 프로젝트 이미지">
                        <img src="https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=800&q=80" alt="세 번째 프로젝트 이미지">
                    </div>
                    
                    <!-- Slider Up: Texts -->
                    <div class="slider__up">
                        
                        <!-- Slide 1 Text (Active) -->
                        <div class="slider__txt is-active">
                            <div class="slider__txtwrap">
                                <a href="#" class="slider__category" title="웹 디자인">웹 디자인</a>
                                <h1>첫 번째 포트폴리오 프로젝트</h1>
                                <a href="post.html" class="slider__btn">
                                    <span class="slider__btn__txt">자세히 보기</span>
                                    <span class="slider__btn__icon">
                                        <svg><use xlink:href="../assets/svg/svg-map.svg#arrow-next"/></svg>
                                    </span>
                                </a>
                            </div>
                        </div>
                        
                        <!-- Slide 2 Text -->
                        <div class="slider__txt">
                            <div class="slider__txtwrap">
                                <a href="#" class="slider__category" title="개발">개발</a>
                                <h1>두 번째 포트폴리오 프로젝트</h1>
                                <a href="post.html" class="slider__btn">
                                    <span class="slider__btn__txt">자세히 보기</span>
                                    <span class="slider__btn__icon">
                                        <svg><use xlink:href="../assets/svg/svg-map.svg#arrow-next"/></svg>
                                    </span>
                                </a>
                            </div>
                        </div>
                        
                        <!-- Slide 3 Text -->
                        <div class="slider__txt">
                            <div class="slider__txtwrap">
                                <a href="#" class="slider__category" title="기타">기타</a>
                                <h1>세 번째 포트폴리오 프로젝트</h1>
                                <a href="post.html" class="slider__btn">
                                    <span class="slider__btn__txt">자세히 보기</span>
                                    <span class="slider__btn__icon">
                                        <svg><use xlink:href="../assets/svg/svg-map.svg#arrow-next"/></svg>
                                    </span>
                                </a>
                            </div>
                        </div>

                    </div>
                </div>
                
                <!-- Pagination Dots -->
                <div class="slider-dots slider-dots--right">
                    <button class="slider-dots__item">1</button>
                    <button class="slider-dots__item">2</button>
                    <button class="slider-dots__item">3</button>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer__copyright" data-cms="global.footerCopyright"></div>
            
            <!-- Social Buttons -->
            <div class="footer__social">
                <a href="#" aria-label="Github">
                    <svg class="icon">
                        <use xlink:href="../assets/svg/svg-map.svg#github" />
                    </svg>
                </a>
                <a href="#" aria-label="LinkedIn">
                    <svg class="icon">
                        <use xlink:href="../assets/svg/svg-map.svg#linkedin" />
                    </svg>
                </a>
            </div>
        </footer>
        
    </div> <!-- end container -->

    <!-- Theme JS -->
    <script defer src="../assets/js/jquery-3.2.1.slim.min.js"></script>
    <script>window.isEn = true;</script>
    <script defer src="../data/en.js"></script>
    <script defer src="../assets/js/cms.js"></script>
    <script defer src="../assets/js/scripts.min.js"></script>
</body>
</html>
